# 知识库开放API 认证配置
# 支持三种认证方式（按优先级自动降级）：
# 1. 小龙虾个人身份认证（推荐，优先级最高）
# 2. 个人TOKEN认证（使用 COMATE_AUTH_TOKEN）
# 3. 数字员工身份认证（使用 AK/SK，兜底方案）

# 1. 小龙虾个人身份认证配置（第一优先级）
xiaolongxia_auth:
  # 是否启用小龙虾认证，默认 true
  enabled: true
  # 说明：
  # - API基础URL: https://ku.baidu-int.com/wiki/so
  # - 双token认证机制：
  #   * x-ku-open-ugate-token: 自动调用 get-ugate-token SKILL 获取
  # - Token会自动缓存，避免重复获取
  # - 首次获取时需要在手机端如流确认身份
  # - 用户身份识别由 get-ugate-token SKILL 内部处理，无需额外配置

# 2. 个人TOKEN认证（第二优先级）
# 不需要在此配置，直接设置环境变量 COMATE_AUTH_TOKEN 或在 ~/.comate/login 文件中保存
# Token获取地址：https://console.cloud.baidu-int.com/onetool/auth-manage/my-services

# 3. 数字员工身份认证配置（第三优先级，兜底方案）
# 当小龙虾认证和个人TOKEN认证都失败时，自动切换到此认证方式
digital_auth:
  ak: "ak"
  sk: "sk"
